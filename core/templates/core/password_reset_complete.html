{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful · ChinaZed</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#f5f5f5;
            font-family:Arial,sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:500px;
            background:#fff;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
            text-align:center;
        }

        .header{
            background:#E5141A;
            padding:30px 24px;
        }

        .logo{
            font-size:40px;
            font-weight:900;
            color:#fff;
            letter-spacing:-1px;
        }

        .sub{
            margin-top:6px;
            color:rgba(255,255,255,.85);
            font-size:13px;
        }

        .body{
            padding:40px 28px;
        }

        .success-icon{
            font-size:60px;
            margin-bottom:18px;
        }

        h2{
            margin:0 0 14px;
            color:#1a1a1a;
            font-size:30px;
        }

        p{
            color:#666;
            line-height:1.8;
            font-size:15px;
            margin-bottom:24px;
        }

        .btn{
            display:inline-block;
            background:#E5141A;
            color:#fff;
            text-decoration:none;
            padding:14px 28px;
            border-radius:8px;
            font-size:15px;
            font-weight:700;
            transition:.2s;
        }

        .btn:hover{
            background:#c81117;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="header">
        <div class="logo">CHINAZED</div>
        <div class="sub">China to Zambia Marketplace</div>
    </div>

    <div class="body">

        <div class="success-icon">✅</div>

        <h2>Password Reset Successful</h2>

        <p>
            Your password has been changed successfully.
            You can now log in with your new password.
        </p>

        <a href="{% url 'login' %}" class="btn">
            LOGIN NOW
        </a>

    </div>

</div>

</body>
</html>
