{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Product - China Zed</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-orange-50 to-gray-100 text-slate-900">

<div class="min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-6 md:p-8">

        <!-- HEADER -->
        <div class="flex items-center gap-4 mb-8">
            <img src="{% static 'core/images/china-zed-logo.png' %}"
                 class="h-14 w-14 object-contain bg-white rounded-xl p-1 shadow">

            <div>
                <h1 class="text-3xl font-black text-orange-600">
                    Submit Product
                </h1>
                <p class="text-sm text-gray-500">
                    China suppliers / product scouts upload products here
                </p>
            </div>
        </div>

        <!-- SUCCESS MESSAGE -->
        {% if messages %}
            {% for message in messages %}
                <div class="bg-green-50 border border-green-200 text-green-700 p-4 rounded-2xl mb-6">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORM -->
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <!-- Supplier Info -->
            <div>
                <label class="block text-sm font-bold mb-1">Supplier Name</label>
                <input type="text" name="supplier_name"
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
                       placeholder="e.g. Chen Trading">
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">Contact (WeChat / Phone)</label>
                <input type="text" name="supplier_contact"
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
                       placeholder="WeChat ID or Phone">
            </div>

            <!-- Product Info -->
            <div>
                <label class="block text-sm font-bold mb-1">Product Name</label>
                <input type="text" name="product_name"
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
                       placeholder="e.g. Smart Watch Ultra">
            </div>

            <div>
                <label class="block text-sm font-bold mb-1">Description</label>
                <textarea name="description"
                          class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
                          placeholder="Describe product features, sizes, colors..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Price (RMB)</label>
                <input type="number" step="0.01" name="rmb_price"
                       class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-orange-400 outline-none"
                       placeholder="e.g. 120">
            </div>

            <!-- MULTIPLE IMAGE UPLOAD -->
            <div>
                <label class="block text-sm font-bold mb-2">Upload Product Images</label>

                <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 text-center hover:border-orange-400 transition">
                    <input type="file" name="images" multiple class="w-full">

                    <p class="text-sm text-gray-500 mt-2">
                        Upload multiple images (recommended 3–6)
                    </p>
                </div>
            </div>

            <!-- SUBMIT -->
            <button type="submit"
                    class="w-full bg-orange-500 hover:bg-orange-600 transition text-white py-3 rounded-2xl font-black text-lg shadow">
                Submit Product for Review
            </button>

        </form>

        <!-- FOOTER -->
        <div class="mt-6 text-center">
            <a href="{% url 'home' %}"
               class="text-sm text-gray-500 hover:text-orange-600">
                ← Back to Marketplace
            </a>
        </div>

    </div>

</div>

</body>
</html>
