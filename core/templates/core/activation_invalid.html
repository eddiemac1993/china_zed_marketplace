<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation Link Invalid · ChinaZed</title>
    <style>
        body { margin: 0; min-height: 100vh; background: #f2f2f2; color: #1a1a1a; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; padding: 18px; }
        .card { width: 100%; max-width: 520px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 28px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
        .brand { color: #E5141A; font-weight: 900; font-size: 30px; margin-bottom: 12px; }
        .icon { width: 58px; height: 58px; border-radius: 50%; background: #FFF0F0; color: #E5141A; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; margin-bottom: 14px; }
        h1 { margin: 0 0 10px; font-size: 26px; }
        p { color: #666; line-height: 1.7; margin: 0 0 14px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; margin-top: 10px; padding: 11px 18px; background: #E5141A; color: #fff; border-radius: 5px; text-decoration: none; font-weight: 800; }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand">CHINAZED</div>
        <div class="icon">!</div>
        <h1>Activation link invalid</h1>
        <p>This activation link is invalid, expired, or has already been used.</p>
        <p>Please register again with the correct email address, or contact ChinaZed support if you believe this is a mistake.</p>
        <a href="{% url 'register' %}" class="btn">Back to Register</a>
    </main>
</body>
</html>
