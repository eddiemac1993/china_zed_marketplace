{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Email Sent · ChinaZed</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f5f5;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .card{
            background:#fff;
            max-width:480px;
            width:100%;
            padding:36px 28px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .logo{
            font-size:34px;
            font-weight:900;
            color:#E5141A;
            margin-bottom:12px;
        }

        h2{
            margin:0 0 12px;
            color:#1a1a1a;
        }

        p{
            color:#666;
            line-height:1.7;
            font-size:14px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            background:#E5141A;
            color:#fff;
            text-decoration:none;
            padding:12px 24px;
            border-radius:8px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">CHINAZED</div>

    <h2>Password Reset Email Sent</h2>

    <p>
        If an account exists with that email address,
        we have sent a password reset link.
    </p>

    <p>
        Please check your inbox and spam folder.
    </p>

    <a href="{% url 'login' %}">
        Back to Login
    </a>
</div>

</body>
</html>
