<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#f5f5f5;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            padding:20px;
        }

        .box{
            background:#fff;
            padding:40px;
            border-radius:12px;
            text-align:center;
            max-width:500px;
            width:100%;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        h1{
            font-size:70px;
            margin:0;
            color:#e5141a;
        }

        h2{
            margin:10px 0;
            font-size:28px;
        }

        p{
            color:#666;
            line-height:1.7;
        }

        a{
            display:inline-block;
            margin-top:20px;
            background:#e5141a;
            color:#fff;
            text-decoration:none;
            padding:12px 24px;
            border-radius:6px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>500</h1>
    <h2>Something Went Wrong</h2>

    <p>
        Our team has been notified.
        Please try again later.
    </p>

    <a href="{% url 'home' %}">
        Back to Home
    </a>
</div>

</body>
</html>
